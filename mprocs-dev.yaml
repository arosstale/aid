cwd: .

procs:
  - name: Git Monitor
    cmd: bash -c "clear; while true; do git log --oneline -10 && echo && git status --short && sleep 3 && clear; done"

  - name: README
    cmd: cat 00_README_PI_BUILDER.md

  - name: Research
    cmd: cat RESEARCH_SUMMARY.md

  - name: File List
    cmd: bash -c "clear; while true; do ls -lh PI_BUILDER*.* RESEARCH*.* AUTOMAKER*.* QUICK*.* START_HERE_PI*.* 2>/dev/null && sleep 5 && clear; done"

  - name: PRD Status
    cmd: bash -c "node -e \"const p=JSON.parse(require('fs').readFileSync('PI_BUILDER_PRD.json')); const total=p.stories.length; const done=p.stories.filter(s=>s.passes).length; console.log('Complete: '+done+'/'+total); console.log('Progress: '+(Math.round(done/total*100))+'%'); p.stories.filter(s=>!s.passes).slice(0,5).forEach(s=>console.log('  ['+s.id+'] '+s.title));\" && sleep 2"
