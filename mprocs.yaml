# Pi Builder Ralph Loop - mprocs configuration
# Runs multiple processes to support Pi Builder development

procs:
  - name: "📖 Research Overview"
    cmd: 'cat 00_README_PI_BUILDER.md'
    
  - name: "📝 Research Summary"
    cmd: 'cat RESEARCH_SUMMARY.md'
    
  - name: "🚀 Quick Reference"
    cmd: 'cat QUICK_REFERENCE.md'
    
  - name: "🛠️  Ralph Loop Prompt"
    cmd: 'cat PI_BUILDER_PROMPT.md'
    
  - name: "📊 PRD (24 Stories)"
    cmd: 'cat PI_BUILDER_PRD.json'
    
  - name: "📍 Git Status"
    cmd: 'watch -n 2 "git log --oneline -10 && echo && git status --short"'
    
  - name: "📄 Progress Log"
    cmd: 'tail -f PI_BUILDER_PROGRESS.txt'

